<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <title>Banda Transportadora Industrial - VR y AR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
  </head>
  <body>
    <a-scene webxr="optionalFeatures: local-floor, hit-test" shadow="type: pcfsoft" xr-mode-ui="XRMode: ar">

      <a-assets>
        <a-mixin id="cuerpo-botella" 
                 geometry="primitive: cylinder; radius: 0.06; height: 0.3" 
                 material="color: #2ECC71; metalness: 0.3; roughness: 0.2" 
                 shadow></a-mixin>
        <a-mixin id="tapa-botella" 
                 geometry="primitive: cylinder; radius: 0.02; height: 0.08" 
                 material="color: #BDC3C7; metalness: 0.8; roughness: 0.1" 
                 position="0 0.19 0"></a-mixin>
      </a-assets>

      <a-entity hide-on-enter-ar>
        <a-sky color="#ECECEC"></a-sky>
        <a-plane position="0 0 0" 
                 rotation="-90 0 0" 
                 width="50" 
                 height="50" 
                 color="#7F8C8D" 
                 shadow="receive: true"></a-plane>
      </a-entity>
      
      <a-light type="ambient" color="#FFF" intensity="0.5"></a-light>
      <a-light type="directional" color="#FFF" intensity="0.6" position="-1 3 1" castShadow="true"></a-light>

      <a-entity id="sistema-industrial" position="0 0 -3.5">

        <a-entity id="estructura-banda">
          <a-box id="superficie-banda" position="0 0.9 0" width="7" height="0.1" depth="0.8" color="#1C2833" shadow></a-box>
          <a-entity id="patas-soporte">
            <a-box position="-3 0.45 0" width="0.2" height="0.9" depth="0.7" color="#7F8C8D" shadow></a-box> 
            <a-box position="-1 0.45 0" width="0.15" height="0.9" depth="0.7" color="#7F8C8D" shadow></a-box> 
            <a-box position="1 0.45 0" width="0.15" height="0.9" depth="0.7" color="#7F8C8D" shadow></a-box>  
            <a-box position="3 0.45 0" width="0.2" height="0.9" depth="0.7" color="#7F8C8D" shadow></a-box>  
          </a-entity>
          <a-entity id="rodillos" position="0 0.9 0">
            <a-cylinder position="-3.45 0 0" rotation="90 0 0" radius="0.06" height="0.9" color="#BDC3C7"></a-cylinder> 
            <a-cylinder position="3.45 0 0" rotation="90 0 0" radius="0.06" height="0.9" color="#BDC3C7"></a-cylinder>  
          </a-entity>
        </a-entity> 

        <a-entity id="alimentador" position="-3.6 1.4 0">
          <a-box width="1.2" height="1.0" depth="1.0" color="#34495E" shadow></a-box>
          <a-cylinder position="0 -0.55 0" radius="0.4" height="0.3" color="#2C3E50" scale="1.0 1.0 1.0"></a-cylinder>
          <a-box position="0 -0.8 0" width="0.2" height="1.5" depth="0.2" color="#7F8C8D"></a-box>
        </a-entity>

        <a-entity id="pallet-destino" position="3.6 0 0">
          <a-box position="0 0.1 0" width="1.5" height="0.2" depth="1.5" color="#D35400" shadow></a-box>
          <a-entity id="listones" position="0 0.22 0">
            <a-box position="0 0 -0.6" width="1.5" height="0.04" depth="0.15" color="#E67E22"></a-box>
            <a-box position="0 0 -0.3" width="1.5" height="0.04" depth="0.15" color="#E67E22"></a-box>
            <a-box position="0 0 0"   width="1.5" height="0.04" depth="0.15" color="#E67E22"></a-box>
            <a-box position="0 0 0.3"  width="1.5" height="0.04" depth="0.15" color="#E67E22"></a-box>
            <a-box position="0 0 0.6"  width="1.5" height="0.04" depth="0.15" color="#E67E22"></a-box>
          </a-entity>
        </a-entity>

        <a-entity id="flujo-botellas" position="0 0.95 0">
          <a-entity class="botella" position="-3.4 0 0" animation="property: position; from: -3.4 0 0; to: 3.4 0 0; dur: 6000; easing: linear; loop: true">
            <a-entity mixin="cuerpo-botella"></a-entity> <a-entity mixin="tapa-botella"></a-entity>   
          </a-entity>
          <a-entity class="botella" position="-3.4 0 0" animation="property: position; from: -3.4 0 0; to: 3.4 0 0; dur: 6000; delay: 1500; easing: linear; loop: true">
            <a-entity mixin="cuerpo-botella"></a-entity> <a-entity mixin="tapa-botella"></a-entity>
          </a-entity>
          <a-entity class="botella" position="-3.4 0 0" animation="property: position; from: -3.4 0 0; to: 3.4 0 0; dur: 6000; delay: 3000; easing: linear; loop: true">
            <a-entity mixin="cuerpo-botella"></a-entity> <a-entity mixin="tapa-botella"></a-entity>
          </a-entity>
          <a-entity class="botella" position="-3.4 0 0" animation="property: position; from: -3.4 0 0; to: 3.4 0 0; dur: 6000; delay: 4500; easing: linear; loop: true">
            <a-entity mixin="cuerpo-botella"></a-entity> <a-entity mixin="tapa-botella"></a-entity>
          </a-entity>
        </a-entity> 

      </a-entity> 

      <a-entity id="rig" movement-controls="speed: 0.15">
        
        <a-entity camera position="0 1.6 0" look-controls="pointerLockEnabled: false"></a-entity>
        
        <a-entity laser-controls="hand: left" oculus-touch-controls="hand: left"></a-entity>
        <a-entity laser-controls="hand: right" oculus-touch-controls="hand: right"></a-entity>
        
      </a-entity>

    </a-scene>
  </body>
</html>
