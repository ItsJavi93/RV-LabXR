<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <title>Sistema Industrial VR en A-Frame</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      
      <a-plane position="0 0 0" rotation="-90 0 0" width="30" height="30" color="#555555"></a-plane>
      <a-sky color="#D6EAF8"></a-sky>

      <a-entity id="maquina-principal" position="0 0 -5">

        <a-box position="0 1.5 0" width="4" height="3" depth="2" color="#2C3E50">
          
          <a-box position="0 0.5 1.05" width="2" height="1" depth="0.1" color="#34495E">
            <a-sphere position="-0.5 0 0.05" radius="0.1" color="#E74C3C"></a-sphere> <a-sphere position="0 0 0.05" radius="0.1" color="#F1C40F"></a-sphere>   <a-sphere position="0.5 0 0.05" radius="0.1" color="#2ECC71"></a-sphere> </a-box>

        </a-box>

        <a-cylinder position="-1.5 4 0" radius="0.8" height="2" color="#E67E22">
          <a-sphere position="0 0.5 0.8" radius="0.15" color="#3498DB"></a-sphere>
        </a-cylinder>

        <a-cylinder position="1.5 4 0" radius="0.8" height="2" color="#E67E22">
          <a-sphere position="0 0.5 0.8" radius="0.15" color="#3498DB"></a-sphere>
        </a-cylinder>

        <a-cylinder position="0 4 0" rotation="0 0 90" radius="0.2" height="3" color="#95A5A6"></a-cylinder>

      </a-entity>

      <a-entity camera look-controls wasd-controls position="0 1.6 0"></a-entity>
      <a-light type="ambient" color="#aaaaaa"></a-light>
      <a-light type="directional" color="#ffffff" position="-1 2 1" intensity="0.8"></a-light>

    </a-scene>
  </body>
</html>
