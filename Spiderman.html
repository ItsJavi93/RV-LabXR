<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <title>Mi Modelo VR en A-Frame</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    
    <script>
      AFRAME.registerComponent('no-culling', {
        init: function () {
          this.el.addEventListener('model-loaded', () => {
            const mesh = this.el.getObject3D('mesh');
            if (mesh) {
              mesh.traverse((node) => {
                if (node.isMesh) {
                  node.frustumCulled = false;
                }
              });
            }
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <a-asset-item 
            id="mi-modelo" 
            src="https://cdn.jsdelivr.net/gh/ItsJavi93/RV-LabXR@main/obj_1_Spiderman%20urban.glb">
        </a-asset-item>
      </a-assets>

      <a-entity 
          gltf-model="#mi-modelo" 
          no-culling
          position="-6 0 4" 
          scale="0.05 0.05 0.05">
      </a-entity>

      <a-plane position="0 0 0" rotation="-90 0 0" width="10" height="10" color="#7BC8A4"></a-plane>
      <a-sky color="#ECECEC"></a-sky>

      <a-entity camera look-controls wasd-controls position="0 1.6 0"></a-entity>
    </a-scene>
  </body>
</html>
